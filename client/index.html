<!DOCTYPE html>
<html>
<head>
  <title>Premium File Manager</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin: 40px 0 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #files {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px 0;
    }

    .card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 25px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: #fff;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .card-content {
      position: relative;
      z-index: 2;
    }

    .file-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      word-break: break-word;
      color: #fff;
    }

    .file-info {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
    }

    .file-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      min-width: 80px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-open {
      background: linear-gradient(45deg, #48dbfb, #1dd1a1);
      color: white;
      box-shadow: 0 4px 15px rgba(72, 219, 251, 0.3);
    }

    .btn-open:hover {
      box-shadow: 0 6px 20px rgba(72, 219, 251, 0.4);
    }

    .btn-rename {
      background: linear-gradient(45deg, #ff9f43, #feca57);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 159, 67, 0.3);
    }

    .btn-rename:hover {
      box-shadow: 0 6px 20px rgba(255, 159, 67, 0.4);
    }

    .btn-delete {
      background: linear-gradient(45deg, #ee5253, #ff6b6b);
      color: white;
      box-shadow: 0 4px 15px rgba(238, 82, 83, 0.3);
    }

    .btn-delete:hover {
      box-shadow: 0 6px 20px rgba(238, 82, 83, 0.4);
    }

    .download-btn {
      background: linear-gradient(45deg, #a29bfe, #6c5ce7);
      color: white;
      box-shadow: 0 4px 15px rgba(162, 155, 254, 0.3);
      margin-bottom: 10px;
    }

    .download-btn:hover {
      box-shadow: 0 6px 20px rgba(162, 155, 254, 0.4);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
        margin: 20px 0;
      }

      .container {
        padding: 10px;
      }

      #files {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }

      .card {
        padding: 20px;
      }

      .file-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      #files {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.8rem;
        margin: 20px 0 15px;
      }

      .container {
        padding: 10px;
      }

      #files {
        gap: 12px;
        padding: 10px 0;
      }

      .card {
        padding: 16px;
        border-radius: 16px;
      }

      .file-name {
        font-size: 16px;
        margin-bottom: 10px;
      }

      .file-info {
        font-size: 13px;
        margin-bottom: 15px;
      }

      .file-actions {
        gap: 8px;
      }

      .btn {
        min-width: 0;
        width: 100%;
        font-size: 13px;
        padding: 10px 14px;
      }
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left: 4px solid #48dbfb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .error {
      background: linear-gradient(45deg, #ee5253, #ff6b6b);
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
      animation: slideIn 0.3s ease-out;
    }

    .success {
      background: linear-gradient(45deg, #10ac84, #1dd1a1);
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      max-width: 400px;
    }

    .toast {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      animation: toastSlideIn 0.4s ease-out;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toast.success {
      border-left: 4px solid #10ac84;
    }

    .toast.error {
      border-left: 4px solid #ee5253;
    }

    .toast-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .toast.success .toast-icon {
      color: #10ac84;
    }

    .toast.error .toast-icon {
      color: #ee5253;
    }

    .toast-message {
      flex: 1;
      font-weight: 500;
      color: #333;
    }

    .toast-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #666;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .toast-close:hover {
      background: rgba(0, 0, 0, 0.1);
      color: #333;
    }

    /* Avoid hover “jump” effects on touch devices */
    @media (hover: none) {
      .card:hover {
        transform: none;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      }

      .btn:hover {
        transform: none;
      }
    }

    @keyframes toastSlideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .toast-container {
        left: 10px;
        right: 10px;
        top: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <h1>☁️ Cloud File Manager</h1>

    <div id="files"></div>
  </div>


<script>
    const API =
      window.location.protocol === "file:"
        ? "http://localhost:3000"
        : window.location.origin;

    // ✅ Load files (from Google Drive)
    async function loadFiles() {
      const container = document.getElementById("files");
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">Loading files...</div>
        </div>
      `;

      try {
        const response = await fetch(API + "/files");

        if (!response.ok) {
          throw new Error("Failed to load files");
        }

        const data = await response.json();
        const files = data.files || [];

        container.innerHTML = "";

        if (files.length === 0) {
          container.innerHTML = `
            <div class="loading">
              <div class="loading-text">No files found.</div>
            </div>
          `;
          return;
        }

        files.forEach(f => {
          const fileSize = f.size ? formatFileSize(f.size) : 'Unknown size';
          const createdDate = f.createdTime ? new Date(f.createdTime).toLocaleDateString() : 'Unknown date';

          container.innerHTML += `
            <div class="card">
              <div class="card-content">
                <div class="file-name">${escapeHtml(f.name)}</div>
                <div class="file-info">
                  Size: ${fileSize}<br>
                  Created: ${createdDate}
                </div>

                <div class="file-actions">
                  <a href="${API}/download/${f.id}" class="btn download-btn" target="_blank">Download</a>
                  <a href="https://drive.google.com/file/d/${f.id}/view" class="btn btn-open" target="_blank">View</a>
                </div>
              </div>
            </div>
          `;
        });
      } catch (err) {
        container.innerHTML = `<div class="loading"><div class="loading-text">Error loading files</div></div>`;
        showError("Failed to load files: " + err.message);
      }
    }

    // Utility functions
    function formatFileSize(bytes) {
      if (!bytes) return '0 B';
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message, type = 'success') {
      const toastContainer = document.getElementById('toastContainer');

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;

      const icon = type === 'success' ? '✅' : '❌';

      toast.innerHTML = `
        <span class="toast-icon">${icon}</span>
        <span class="toast-message">${message}</span>
        <button class="toast-close" onclick="this.parentElement.remove()">×</button>
      `;

      toastContainer.appendChild(toast);

      // Auto remove after 4 seconds
      setTimeout(() => {
        if (toast.parentElement) {
          toast.style.animation = 'toastSlideIn 0.4s ease-in reverse';
          setTimeout(() => toast.remove(), 400);
        }
      }, 4000);
    }

    function showError(message) {
      showToast(message, 'error');
    }

    function showSuccess(message) {
      showToast(message, 'success');
    }

    // Load on start
    loadFiles();
</script>

</body>
</html>
